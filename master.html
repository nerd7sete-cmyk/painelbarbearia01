<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Master</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b141a;
color:#fff;
}

.container{
max-width:480px;
margin:auto;
padding:16px;
}

/* HEADER */
.topo{
background: linear-gradient(145deg,#1a242c,#111b21);
padding:18px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.nome{font-size:18px;font-weight:700;}
.sub{font-size:12px;opacity:0.7;}

.logout{
background:#0f1720;
border:1px solid rgba(255,255,255,0.1);
color:#fff;
padding:10px;
border-radius:12px;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

/* CARD PADRÃO */
.card{
padding:18px;
border-radius:20px;
background: linear-gradient(145deg,#1a242c,#111b21);
border:1px solid rgba(255,255,255,0.05);
cursor:pointer;
position:relative;
}

.card::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:2px;
background:linear-gradient(90deg,#ffd700,#ffb700);
opacity:0.6;
}

.titulo{font-size:14px;font-weight:600;}
.subinfo{font-size:12px;opacity:0.7;margin-top:4px;}
</style>
</head>

<body>

<div class="container">

<div class="topo">
<div>
<div class="nome">Painel Master 👑</div>
<div class="sub">Controle total do sistema</div>
</div>

<button class="logout" onclick="logout()">Sair</button>
</div>

<div class="grid" id="grid"></div>

</div>

<script>

function ir(p){
window.location.href = p;
}

// 🔥 MENUS DINÂMICOS
let menus = JSON.parse(localStorage.getItem("menuMaster"));

if(!menus){
menus = [
{ titulo:"Barbeiros", sub:"Gerenciar barbeiros", link:"barbeiros.html" },
{ titulo:"Criar Barbeiro", sub:"Adicionar novo", link:"criar-barbeiro.html" },
{ titulo:"Planos", sub:"Valores e PIX", link:"renovacao-config.html" },
{ titulo:"Builder", sub:"Editar painel", link:"builder-master.html" }
];

localStorage.setItem("menuMaster", JSON.stringify(menus));
}

// 🔥 RENDER
function render(){

let grid = document.getElementById("grid");
grid.innerHTML = "";

menus.forEach(m=>{

let card = document.createElement("div");
card.className = "card";
card.onclick = ()=> ir(m.link);

card.innerHTML = `
<div class="titulo">${m.titulo}</div>
<div class="subinfo">${m.sub || ""}</div>
`;

grid.appendChild(card);

});

}

function logout(){
window.location.href = "login.html";
}

render();

</script>

</body>
</html>
