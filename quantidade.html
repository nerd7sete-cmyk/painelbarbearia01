<!-- ===================================== -->
<!-- MODAL SHOPEE -->
<!-- ===================================== -->

<style>

.overlay-buy{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,.55);

z-index:999999;

opacity:0;
visibility:hidden;

transition:.25s;
}

.overlay-buy.active{
opacity:1;
visibility:visible;
}

/* MODAL */

.buy-modal{

position:absolute;

left:50%;
bottom:0;

transform:translateX(-50%) translateY(100%);

width:100%;
max-width:430px;

background:#fff;

border-radius:22px 22px 0 0;

padding:16px;

transition:.28s cubic-bezier(.22,1,.36,1);

}

.overlay-buy.active .buy-modal{
transform:translateX(-50%) translateY(0);
}

/* TOPO */

.modal-top{
display:flex;
gap:14px;
position:relative;
}

.modal-image{
width:92px;
height:92px;

border-radius:8px;

overflow:hidden;

border:1px solid #eee;

flex:none;
}

.modal-image img{
width:100%;
height:100%;
object-fit:cover;
}

/* FECHAR */

.close-modal{
position:absolute;
top:-4px;
right:0;

font-size:28px;
color:#999;

cursor:pointer;
}

/* INFO */

.modal-info{
flex:1;
padding-top:10px;
}

.modal-price{
font-size:18px;
font-weight:500;
color:#ee4d2d;
line-height:1.4;
}

.modal-price small{
font-size:14px;
font-weight:400;
}

.modal-old{
font-size:13px;
color:#777;
margin-top:2px;
}

.modal-stock{
margin-top:10px;
font-size:13px;
color:#999;
}

/* DIVISOR */

.modal-divider{
height:1px;
background:#f0f0f0;
margin:18px 0;
}

/* TITULO */

.option-title{
font-size:15px;
font-weight:500;
color:#222;
margin-bottom:12px;
}

/* OPÇÕES */

.option-list{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.option-btn{

height:42px;

padding:0 18px;

border:1px solid #ddd;
border-radius:10px;

background:#fff;

font-size:14px;
color:#333;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

transition:.15s;

}

.option-btn.active{
border:1.5px solid #ee4d2d;
background:#fff5f2;
color:#ee4d2d;
}

/* QUANTIDADE */

.quantity-area{

margin-top:24px;

display:flex;
align-items:center;
justify-content:space-between;

}

.quantity-title{
font-size:15px;
font-weight:500;
color:#222;
}

.quantity-box{
display:flex;
align-items:center;
}

.quantity-btn{

width:42px;
height:42px;

border:1px solid #ddd;

background:#fff;

font-size:28px;
color:#999;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;
}

.quantity-number{

width:58px;
height:42px;

border-top:1px solid #ddd;
border-bottom:1px solid #ddd;

display:flex;
align-items:center;
justify-content:center;

font-size:18px;
font-weight:500;
color:#ee4d2d;
}

/* BOTÃO */

.buy-now{

margin-top:26px;

width:100%;
height:54px;

border:none;
border-radius:14px;

background:#f54f2e;

font-size:19px;
font-weight:500;

color:#fff;

cursor:pointer;
}

</style>

<!-- OVERLAY -->

<div class="overlay-buy" id="overlayBuy">

<!-- MODAL -->

<div class="buy-modal">

<!-- TOPO -->

<div class="modal-top">

<div class="modal-image">

<img
src="https://i.ibb.co/pvJXf0m/IMG-4866.jpg"
>

</div>

<div class="modal-info">

<div class="modal-price">

R$111,60
<small>no Pix com cupom ></small>

</div>

<div class="modal-old">

ou R$127,99 sem cupom

</div>

<div class="modal-stock">

Estoque: 12

</div>

</div>

<div
class="close-modal"
id="closeModal"
>

×

</div>

</div>

<!-- DIVISOR -->

<div class="modal-divider"></div>

<!-- COR -->

<div class="option-title">

Cor

</div>

<div class="option-list">

<div class="option-btn active">
Siena
</div>

<div class="option-btn">
Preto
</div>

<div class="option-btn">
Azul
</div>

<div class="option-btn">
Verde
</div>

</div>

<!-- COMBO -->

<div
class="option-title"
style="margin-top:24px;"
>

Combo

</div>

<div class="option-list">

<div class="option-btn">
1 Unidade
</div>

<div class="option-btn">
2 Unidades
</div>

<div class="option-btn active">
Kit Premium
</div>

</div>

<!-- QUANTIDADE -->

<div class="quantity-area">

<div class="quantity-title">

Quantidade

</div>

<div class="quantity-box">

<div
class="quantity-btn"
id="minusQty"
>

−

</div>

<div
class="quantity-number"
id="qtyNumber"
>

1

</div>

<div
class="quantity-btn"
id="plusQty"
>

+

</div>

</div>

</div>

<!-- BOTÃO -->

<button class="buy-now">

Compre agora

</button>

</div>

</div>

<script>

/* ===================================== */
/* ABRIR MODAL */
/* ===================================== */

function openBuyModal(){

document
.getElementById("overlayBuy")
.classList.add("active");

}

/* ===================================== */
/* FECHAR */
/* ===================================== */

function closeBuyModal(){

document
.getElementById("overlayBuy")
.classList.remove("active");

}

document
.getElementById("closeModal")
.addEventListener("click", closeBuyModal);

/* FECHAR AO CLICAR FORA */

document
.getElementById("overlayBuy")
.addEventListener("click", function(e){

if(e.target.id === "overlayBuy"){

closeBuyModal();

}

});

/* ===================================== */
/* QUANTIDADE */
/* ===================================== */

let qty = 1;

const qtyNumber =
document.getElementById("qtyNumber");

document
.getElementById("plusQty")
.addEventListener("click", ()=>{

qty++;

qtyNumber.innerText = qty;

});

document
.getElementById("minusQty")
.addEventListener("click", ()=>{

if(qty > 1){

qty--;

qtyNumber.innerText = qty;

}

});

/* ===================================== */
/* BOTÕES SELEÇÃO */
/* ===================================== */

document
.querySelectorAll(".option-list")
.forEach(group=>{

const buttons =
group.querySelectorAll(".option-btn");

buttons.forEach(btn=>{

btn.addEventListener("click", ()=>{

buttons.forEach(b=>{

b.classList.remove("active");

});

btn.classList.add("active");

});

});

});

/* ===================================== */
/* TESTE AUTOMÁTICO */
/* ===================================== */

/* APAGA ISSO DEPOIS */

setTimeout(()=>{

openBuyModal();

},500);

</script>
